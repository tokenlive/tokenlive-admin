[General]
AppName = "tokenlive-admin"
Version = "v1.0.0"
Debug = false
PprofAddr = ""
DisableSwagger = true
DisablePrintConfig = true
DefaultLoginPwd = "c27435962ded9355cccc4017152c18f0" # MD5("2026@Beijing")
MenuFile = "menu.json" # Or use "menu_cn.json"
DenyOperateMenu = false

[General.HTTP]
Addr = ":8040"
ShutdownTimeout = 10
ReadTimeout = 60
WriteTimeout = 60
IdleTimeout = 10
CertFile = ""
KeyFile = ""

[General.Root] # Super Administrator Account
ID = "root"
Username = "admin"
Password = "${ROOT_PASSWORD:admin}" # Compared directly with the login request password
Name = "Admin"

[Storage]

[Storage.Cache]
Type = "${STORAGE_CACHE_TYPE:memory}" # memory/badger/redis
Delimiter = ":"

[Storage.Cache.Memory]
CleanupInterval = 60

[Storage.Cache.Badger]
Path = "data/cache"

[Storage.Cache.Redis]
Addr = "${REDIS_ADDR:}"
Username = "${REDIS_USERNAME:}"
Password = "${REDIS_PASSWORD:}"
DB = 0

[Storage.DB]
Debug = false
Type = "${DB_TYPE:sqlite3}"
DSN = "${DB_DSN:data/tokenlive-admin.db}"
MaxLifetime = 86400
MaxIdleTime = 3600
MaxOpenConns = 100
MaxIdleConns = 50
TablePrefix = ""
AutoMigrate = true

[Storage.EventQueue]
Type = "redis"                        # redis | kafka
Topic = "aigw:events:policy"          # Redis Stream key / Kafka topic
ConsumerGroup = "admin-consumer"
RetentionDays = 2                     # 事件保留天数
CleanupIntervalHours = 6              # 清理任务执行间隔（小时）

[Util]

[Util.Captcha]
Length = 4
Width = 400
Height = 160
CacheType = "memory" # memory/redis

[Util.Captcha.Redis]
Addr = "" # If empty, then use the same configuration as Storage.Cache.Redis
Username = ""
Password = ""
DB = 0
KeyPrefix = "captcha:"

[Util.Prometheus]
Enable = true
Port = 9100
BasicUsername = "admin"
BasicPassword = "admin"
LogApis = [] # Log APIs, e.g. ["/api/v1/users"]
LogMethods = [] # Log HTTP methods, e.g. ["GET"]
DefaultCollect = true

[Util.PrometheusServer]
Address = "${PROMETHEUS_SERVER_URL:http://localhost:9090}"
Username = "${PROMETHEUS_SERVER_USERNAME:admin}"
Password = "${PROMETHEUS_SERVER_PASSWORD:}"

[Dictionary]
UserCacheExp = 4 # hours

[Gateway]
APIKeyPepper = "${GATEWAY_API_KEY_PEPPER:}"

[Sync]
Endpoints = true
Policies = true
