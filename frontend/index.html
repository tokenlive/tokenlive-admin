<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
        href="/favicon.ico" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    /* 预设暗黑模式背景，防止白色闪烁 */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* 默认亮色模式 */
    body {
      background: #ffffff;
    }

    /* 暗黑模式 - 通过媒体查询自动适应 */
    @media (prefers-color-scheme: dark) {
      body {
        background: #09090b;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="app-loading">
      <div class="app-loading__loader"></div>
      <div class="app-loading__title">正在加载资源</div>
      <div class="app-loading__desc">初次加载需要较长时间 请耐心等待</div>
    </div>
    <style>
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: #ffffff;
        color: rgba(0, 0, 0, .85);
      }

      .app-loading__loader {
        box-sizing: border-box;
        width: 32px;
        height: 32px;
        border: 3px solid transparent;
        border-top-color: rgba(0, 0, 0, .65);
        border-radius: 50%;
        animation: 1.2s loader linear infinite;
        position: relative;
      }

      .app-loading__loader:before {
        box-sizing: border-box;
        content: '';
        display: block;
        width: inherit;
        height: inherit;
        position: absolute;
        top: -3px;
        left: -3px;
        border: 3px solid rgba(0, 0, 0, .25);
        border-radius: 50%;
        opacity: .5;
      }

      .app-loading__title {
        font-size: 18px;
        color: inherit;
        margin-top: 30px;
      }

      .app-loading__desc {
        font-size: 14px;
        color: inherit;
        margin-top: 8px;
        opacity: 0.65;
      }

      /* 暗黑模式样式 */
      .app-loading--dark {
        background: #09090b;
        color: rgba(255, 255, 255, .85);
      }

      .app-loading--dark .app-loading__loader {
        border-top-color: #1677ff;
      }

      .app-loading--dark .app-loading__loader:before {
        border-color: rgba(255, 255, 255, .1);
      }

      /* 系统暗黑模式自动适应 */
      @media (prefers-color-scheme: dark) {
        .app-loading {
          background: #09090b;
          color: rgba(255, 255, 255, .85);
        }

        .app-loading .app-loading__loader {
          border-top-color: #1677ff;
        }

        .app-loading .app-loading__loader:before {
          border-color: rgba(255, 255, 255, .1);
        }
      }

      @keyframes loader {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      // 立即读取主题配置并应用
      (function() {
        try {
          // 从sessionStorage读取配置
          // Vite会在构建时替换%VITE_STORAGE_NAMESPACE%
          var storageNamespace = '%VITE_STORAGE_NAMESPACE%' || 'th_';
          var configKey = storageNamespace + 'config';
          var storedConfig = sessionStorage.getItem(configKey);

          if (storedConfig) {
            var config = JSON.parse(storedConfig);
            if (config.theme === 'dark') {
              // 同时设置body和loading的暗黑模式
              document.body.style.background = '#09090b';
              var loadingEl = document.querySelector('.app-loading');
              if (loadingEl) {
                loadingEl.classList.add('app-loading--dark');
              }
            }
          }
        } catch (e) {
          // 如果读取失败，使用CSS媒体查询作为后备方案
          console.log('Failed to load theme config, using system preference');
        }
      })();
    </script>
  </div>
  <script src="/libs/tinymce/tinymce.min.js"></script>
  <script type="module"
          src="/src/main.js"></script>
</body>

</html>
