name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0). If empty, fallback to tag.'
        required: false
        default: ''

env:
  APP_NAME: tokenlive-admin

permissions:
  contents: write
  packages: write

jobs:
  # Step 1: Build frontend (shared across all platforms)
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build frontend
      run: make build-frontend

    - name: Upload frontend dist
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/

  # Step 2: Build multi-platform binaries in parallel (pure Go, no CGO needed)
  build-binaries:
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Download frontend dist
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/

    - name: Extract version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          VERSION_TMP="${GITHUB_REF#refs/tags/}"
          if [[ "${VERSION_TMP}" == refs/heads/* ]] || [[ "${VERSION_TMP}" == refs/pull/* ]]; then
            VERSION_TMP="v0.0.0-${GITHUB_SHA::7}"
          fi
          echo "VERSION=${VERSION_TMP}" >> $GITHUB_OUTPUT
        fi

    - name: Build binary
      env:
        CGO_ENABLED: 0
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        BINARY_NAME="${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
        go build -ldflags "-w -s -X main.VERSION=${{ steps.version.outputs.VERSION }}" -o "${BINARY_NAME}" .

    - name: Package binary
      run: |
        BINARY_NAME="${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip "${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" "${BINARY_NAME}"
        else
          chmod +x "${BINARY_NAME}"
          tar -czf "${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" "${BINARY_NAME}"
        fi

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
        path: |
          ${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          ${{ env.APP_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip

  # Step 3: Build & push multi-arch Docker image
  docker:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
    - uses: actions/checkout@v4

    - name: Download frontend dist
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/

    - name: Extract version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          VERSION_TMP="${GITHUB_REF#refs/tags/}"
          if [[ "${VERSION_TMP}" == refs/heads/* ]] || [[ "${VERSION_TMP}" == refs/pull/* ]]; then
            VERSION_TMP="v0.0.0-${GITHUB_SHA::7}"
          fi
          echo "VERSION=${VERSION_TMP}" >> $GITHUB_OUTPUT
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Lowercase Repository Name
      id: repo
      run: echo "IMAGE_NAME=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          VERSION=${{ steps.version.outputs.VERSION }}
          RELEASE_TAG=${{ steps.version.outputs.VERSION }}
        tags: |
          ${{ steps.repo.outputs.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          ${{ steps.repo.outputs.IMAGE_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Step 4: Create GitHub Release with all artifacts
  release:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-binaries, docker]
    steps:
    - uses: actions/checkout@v4

    - name: Extract version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          VERSION_TMP="${GITHUB_REF#refs/tags/}"
          if [[ "${VERSION_TMP}" == refs/heads/* ]] || [[ "${VERSION_TMP}" == refs/pull/* ]]; then
            VERSION_TMP="v0.0.0-${GITHUB_SHA::7}"
          fi
          echo "VERSION=${VERSION_TMP}" >> $GITHUB_OUTPUT
        fi

    - name: Download frontend dist
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/

    - name: Package frontend
      run: tar -czf frontend-dist.tar.gz -C frontend dist

    - name: Download all binary artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: binary-*
        merge-multiple: true

    - name: Generate checksums
      run: |
        sha256sum ${{ env.APP_NAME }}_*.tar.gz ${{ env.APP_NAME }}_*.zip frontend-dist.tar.gz > checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        generate_release_notes: true
        files: |
          ${{ env.APP_NAME }}_linux_amd64.tar.gz
          ${{ env.APP_NAME }}_linux_arm64.tar.gz
          ${{ env.APP_NAME }}_darwin_amd64.tar.gz
          ${{ env.APP_NAME }}_darwin_arm64.tar.gz
          ${{ env.APP_NAME }}_windows_amd64.zip
          frontend-dist.tar.gz
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
